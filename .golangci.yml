version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - gofmt
    - ineffassign
    - staticcheck
  # errcheck disabled until error handling refactor is complete (issue #7)
  disable:
    - errcheck

  exclusions:
    rules:
      # testClient is a debug tool; exclude from strict linting
      - path: cmd/testClient
        linters:
          - staticcheck
