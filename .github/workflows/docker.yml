name: Docker

on:
  push:
    branches: ["main"]

jobs:
  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build Linux binaries
        run: |
          mkdir -p bin
          for name_pkg in stockbatch:cmd/batchStocks filterjson:cmd/filterJSON stockclient:cmd/stockClient currentreturn:cmd/currentReturn targetreturn:cmd/targetReturn; do
            name="${name_pkg%%:*}"
            pkg="${name_pkg##*:}"
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -o "bin/${name}-linux-${arch}" "./${pkg}"
            done
          done

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: sliverman69/portfoliotools
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
