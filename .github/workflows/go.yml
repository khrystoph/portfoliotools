name: CI

on:
  push:
    branches: [ "main", "dev" ]
    tags: ['v*']
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1.0

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build all platforms
        run: |
          mkdir -p bin
          for name_pkg in stockbatch:cmd/batchStocks filterjson:cmd/filterJSON stockclient:cmd/stockClient currentreturn:cmd/currentReturn targetreturn:cmd/targetReturn; do
            name="${name_pkg%%:*}"
            pkg="${name_pkg##*:}"
            for platform in linux/amd64 darwin/amd64 windows/amd64; do
              GOOS="${platform%/*}"
              GOARCH="${platform#*/}"
              ext=""
              [ "$GOOS" = "windows" ] && ext=".exe"
              GOOS=$GOOS GOARCH=$GOARCH go build -o "bin/${name}${ext}" "./${pkg}"
              tar -czf "bin/${name}-${GOOS}-${GOARCH}.tar.gz" -C bin "${name}${ext}"
              rm "bin/${name}${ext}"
            done
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfoliotools
          path: bin/*.tar.gz
          compression-level: 6
          overwrite: true
