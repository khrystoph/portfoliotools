name: CI

on:
  push:
    branches: [ "main", "dev" ]
    tags: ['v*']
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build batchStocks
        uses: psethwick/go-cross-build@1.2.0
        with:
          platforms: 'linux/amd64, darwin/amd64, windows/amd64'
          package: 'cmd/batchStocks'
          name: 'stockbatch'
          compress: 'true'
          dest: 'bin'
      - name: Build filterJSON
        uses: psethwick/go-cross-build@1.2.0
        with:
          platforms: 'linux/amd64, darwin/amd64, windows/amd64'
          package: 'cmd/filterJSON'
          name: 'filterjson'
          compress: 'true'
          dest: 'bin'
      - name: Build stockClient
        uses: psethwick/go-cross-build@1.2.0
        with:
          platforms: 'linux/amd64, darwin/amd64, windows/amd64'
          package: 'cmd/stockClient'
          name: 'stockclient'
          compress: 'true'
          dest: 'bin'
      - name: Build currentReturn
        uses: psethwick/go-cross-build@1.2.0
        with:
          platforms: 'linux/amd64, darwin/amd64, windows/amd64'
          package: 'cmd/currentReturn'
          name: 'currentreturn'
          compress: 'true'
          dest: 'bin'
      - name: Build targetReturn
        uses: psethwick/go-cross-build@1.2.0
        with:
          platforms: 'linux/amd64, darwin/amd64, windows/amd64'
          package: 'cmd/targetReturn'
          name: 'targetreturn'
          compress: 'true'
          dest: 'bin'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfoliotools
          path: bin/*.tar.gz
          compression-level: 6
          overwrite: true
